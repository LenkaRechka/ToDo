<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="To-Do">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>To-Do</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(160deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      color: #e8e8e8;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .app.mounted { opacity: 1; }

    /* Header */
    .header {
      padding: 32px 0 20px;
      flex-shrink: 0;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .date-text {
      font-size: 13px;
      color: #666;
      letter-spacing: 0.08em;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .tab.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-weight: 600;
    }

    .tab.inactive {
      background: rgba(255,255,255,0.05);
      color: #888;
      font-weight: 400;
    }

    .tab-badge {
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .tab.active .tab-badge { background: rgba(255,255,255,0.25); }
    .tab.inactive .tab-badge { background: rgba(255,255,255,0.1); }

    /* Input */
    .input-wrap {
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8e8e8;
      font-size: 15px;
      padding: 10px 12px;
      font-family: inherit;
    }

    .input-wrap input::placeholder { color: #555; }

    .add-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 10px;
      color: #555;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .add-btn.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }

    /* Task list */
    .task-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 16px;
    }

    .task-list::-webkit-scrollbar { display: none; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #444;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-text { font-size: 14px; }

    .tasks { display: flex; flex-direction: column; gap: 6px; }

    .task {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      transition: all 0.25s ease;
      animation: fadeSlideIn 0.3s ease both;
    }

    .task.undone {
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .task.done {
      background: rgba(99,102,241,0.06);
      border: 1px solid rgba(99,102,241,0.15);
      opacity: 0.6;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      color: #fff;
      font-size: 13px;
      padding: 0;
    }

    .checkbox.undone {
      background: transparent;
      border: 2px solid rgba(0,0,0,0.25);
    }

    .checkbox.done {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: 2px solid #6366f1;
    }

    .task-text {
      flex: 1;
      font-size: 15px;
      transition: all 0.2s ease;
      word-break: break-word;
    }

    .task-text.undone { color: #1a1a1a; text-decoration: none; }
    .task-text.done { color: #666; text-decoration: line-through; }

    .delete-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s;
      line-height: 1;
    }

    .task.undone .delete-btn { color: #aaa; }
    .task.done .delete-btn { color: #555; }

    /* Summary */
    .summary {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
      color: #555;
      text-align: center;
    }

    /* Footer */
    .footer {
      padding: 16px 0;
      text-align: center;
      flex-shrink: 0;
    }

    .footer p {
      font-size: 11px;
      color: #333;
      line-height: 1.6;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app" class="app"></div>

  <script>
    // ── State ──
    const STORAGE_KEY = 'todo-pwa-data';
    let state = loadState();
    let activeTab = 'today';

    function getToday() {
      return new Date().toISOString().slice(0, 10);
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          return {
            today: parsed.today || [],
            tomorrow: parsed.tomorrow || [],
            lastDate: parsed.lastDate || getToday(),
          };
        }
      } catch (e) {}
      return { today: [], tomorrow: [], lastDate: getToday() };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    // ── Day rollover ──
    function checkDayChange() {
      const now = getToday();
      if (now !== state.lastDate) {
        const carriedOver = state.today.filter(t => !t.done);
        state.today = [...carriedOver, ...state.tomorrow];
        state.tomorrow = [];
        state.lastDate = now;
        activeTab = 'today';
        saveState();
        render();
      }
    }

    // ── Actions ──
    function addTask(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      const task = { id: Date.now(), text: trimmed, done: false };
      state[activeTab].push(task);
      saveState();
      render();
    }

    function toggleTask(tab, id) {
      const task = state[tab].find(t => t.id === id);
      if (task) {
        task.done = !task.done;
        saveState();
        render();
      }
    }

    function removeTask(tab, id) {
      state[tab] = state[tab].filter(t => t.id !== id);
      saveState();
      render();
    }

    function setTab(tab) {
      activeTab = tab;
      render();
      // Focus input after tab switch
      setTimeout(() => {
        const input = document.getElementById('task-input');
        if (input) input.focus();
      }, 50);
    }

    // ── Render ──
    function render() {
      const app = document.getElementById('app');
      const todayUndone = state.today.filter(t => !t.done).length;
      const todayDone = state.today.filter(t => t.done).length;
      const tomorrowCount = state.tomorrow.length;

      const tasks = state[activeTab];
      const sorted = [...tasks].sort((a, b) => Number(a.done) - Number(b.done));

      const dateStr = new Date().toLocaleDateString('cs-CZ', {
        weekday: 'long', day: 'numeric', month: 'long'
      });

      let taskListHTML = '';
      if (sorted.length === 0) {
        const icon = activeTab === 'today' ? '☀️' : '🌙';
        const msg = activeTab === 'today' ? 'Žádné úkoly na dnes' : 'Žádné úkoly na zítra';
        taskListHTML = `<div class="empty-state"><div class="empty-icon">${icon}</div><p class="empty-text">${msg}</p></div>`;
      } else {
        taskListHTML = '<div class="tasks">' + sorted.map((task, i) => {
          const cls = task.done ? 'done' : 'undone';
          return `
            <div class="task ${cls}" style="animation-delay:${i * 0.04}s">
              <button class="checkbox ${cls}" onclick="toggleTask('${activeTab}', ${task.id})">${task.done ? '✓' : ''}</button>
              <span class="task-text ${cls}">${escapeHtml(task.text)}</span>
              <button class="delete-btn" onclick="removeTask('${activeTab}', ${task.id})">×</button>
            </div>`;
        }).join('') + '</div>';
      }

      let summaryHTML = '';
      if (activeTab === 'today' && (todayUndone > 0 || todayDone > 0)) {
        const msg = todayDone > 0 && todayUndone === 0
          ? '🎉 Vše hotovo!'
          : `${todayDone} hotovo · ${todayUndone} zbývá`;
        summaryHTML = `<div class="summary">${msg}</div>`;
      }

      const todayBadge = todayUndone > 0 ? `<span class="tab-badge">${todayUndone}</span>` : '';
      const tomorrowBadge = tomorrowCount > 0 ? `<span class="tab-badge">${tomorrowCount}</span>` : '';
      const placeholder = activeTab === 'today' ? 'Přidat úkol na dnes...' : 'Přidat úkol na zítra...';

      app.innerHTML = `
        <div class="header">
          <div class="header-row">
            <div class="logo">✓</div>
            <h1>to-do</h1>
          </div>
          <div class="date-text">${dateStr}</div>
        </div>

        <div class="tabs">
          <button class="tab ${activeTab === 'today' ? 'active' : 'inactive'}" onclick="setTab('today')">
            Dnes ${todayBadge}
          </button>
          <button class="tab ${activeTab === 'tomorrow' ? 'active' : 'inactive'}" onclick="setTab('tomorrow')">
            Zítra ${tomorrowBadge}
          </button>
        </div>

        <div class="input-wrap">
          <input id="task-input" type="text" placeholder="${placeholder}"
            enterkeyhint="done" autocomplete="off" autocorrect="on" />
          <button id="add-btn" class="add-btn" onclick="handleAdd()">+</button>
        </div>

        <div class="task-list">
          ${taskListHTML}
          ${summaryHTML}
        </div>

        <div class="footer">
          <p>O půlnoci: hotové úkoly zmizí · nedokončené zůstanou<br>Ze Zítra se stane Dnes · Zítra bude prázdné</p>
        </div>
      `;

      // Bind input events
      const input = document.getElementById('task-input');
      const addBtn = document.getElementById('add-btn');

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          addTask(input.value);
          input.value = '';
          updateAddBtn('');
        }
      });

      input.addEventListener('input', () => {
        updateAddBtn(input.value);
      });

      if (!app.classList.contains('mounted')) {
        requestAnimationFrame(() => app.classList.add('mounted'));
      }
    }

    function updateAddBtn(val) {
      const btn = document.getElementById('add-btn');
      if (btn) {
        if (val.trim()) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      }
    }

    function handleAdd() {
      const input = document.getElementById('task-input');
      if (input) {
        addTask(input.value);
        input.value = '';
        updateAddBtn('');
        input.focus();
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Init ──
    checkDayChange();
    render();
    setInterval(checkDayChange, 30000);

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
